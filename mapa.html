<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa Interactivo</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #f8f9fb;
    }

    /* BARRA SUPERIOR */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      padding: 0 15px;
      background: #ffffff;
      border-bottom: 1px solid #e5e5e5;
    }

    .btn-volver {
      background: #C0392B;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.15);
      transition: 0.3s;
    }

    .btn-volver:hover {
      background: #1F5A92;
    }

    /* BOTÓN WAZE */
    .btn-mapa-full {
      background: #1F5A92;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;

      display: flex;
      align-items: center;
      gap: 8px;

      box-shadow: 0 3px 8px rgba(0,0,0,0.15);
      transition: 0.3s;
    }

    .btn-mapa-full:hover {
      background: #C0392B;
    }

    .icono-waze {
      width: 20px;
      height: 20px;
      object-fit: contain;
    }

    /* CONTENEDOR */
    .mapa-container {
      flex: 1;
      position: relative;
    }

    /* IFRAME */
    iframe {
      width: 100%;
      height: 88%;
      border: none;
      display: block;
    }

    /* ESPACIO PARA FILTRO */
    .espacio-filtro {
      height: 12%;
    }

    /* MENSAJE */
    .mensaje {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);

      background: rgba(31, 90, 146, 0.9);
      color: white;

      padding: 10px 16px;
      border-radius: 30px;

      font-size: 13px;

      display: flex;
      align-items: center;
      gap: 8px;

      backdrop-filter: blur(10px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.2);

      z-index: 10;
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translate(-50%, 20px);
      }
      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {

      .top-bar {
        height: 50px;
      }

      iframe {
        height: 85%;
      }

      .espacio-filtro {
        height: 15%;
      }

      .btn-volver,
      .btn-mapa-full {
        font-size: 12px;
        padding: 8px 12px;
      }

      .icono-waze {
        width: 18px;
        height: 18px;
      }

      .mensaje {
        font-size: 11px;
        bottom: 15px;
      }
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="top-bar">
  <a href="index.html" class="btn-volver">← Volver</a>

  <a href="https://www.waze.com/es/live-map/" target="_blank" class="btn-mapa-full">
    <img src="img/waze.png" alt="Waze" class="icono-waze">
    Calcula tu ruta
  </a>
</div>

<!-- MAPA -->
<div class="mapa-container">

  <iframe 
    src="https://srvansvargweb.ansv.gov.co/portalansv/apps/dashboards/5bd060badf5d44aab7eb215255f925fe"
    allow="geolocation"
    allowfullscreen>
  </iframe>

  <div class="mensaje">
    📍 Activa tu ubicación o usa el botón azul
  </div>

  <div class="espacio-filtro"></div>

</div>

<script>
  setTimeout(() => {
    const msg = document.querySelector('.mensaje');
    if (msg) msg.style.display = 'none';
  }, 4000);
</script>

</body>
</html>
