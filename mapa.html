<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa Interactivo</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
    }

    /* BARRA SUPERIOR */
    .top-bar {
      display: flex;
      align-items: center;
      height: 60px;
      padding: 0 15px;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
    }

    /* BOTÓN VOLVER */
    .btn-volver {
      background: #C0392B;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    }

    .btn-volver:hover {
      background: #1F5A92;
    }

    /* CONTENEDOR MAPA */
    .mapa-container {
      width: 100%;
      height: calc(100vh - 60px);
    }

    /* IFRAME */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .top-bar {
        height: 50px;
      }

      .mapa-container {
        height: calc(100vh - 50px);
      }

      .btn-volver {
        font-size: 12px;
        padding: 8px 12px;
      }
    }
  </style>
</head>

<body>

<!-- BARRA SUPERIOR -->
<div class="top-bar">
  <a href="index.html" class="btn-volver">← Volver</a>
</div>

<!-- MAPA -->
<div class="mapa-container">
  <iframe 
    src="https://srvansvargweb.ansv.gov.co/portalansv/apps/dashboards/5bd060badf5d44aab7eb215255f925fe"
    allowfullscreen>
  </iframe>
</div>

</body>
</html>
