<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mapa Interactivo</title>

  <!-- FUENTE MODERNA -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    /* BOTÓN VOLVER */
    .btn-volver {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #1F5A92;
      color: white;
      padding: 10px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
      z-index: 1000;
      transition: 0.3s;
    }

    .btn-volver:hover {
      background: #C0392B;
      transform: translateY(-2px);
    }

    /* MAPA FULL */
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }

  </style>
</head>

<body>

<a href="index.html" class="btn-volver">← Volver</a>

<iframe src="https://srvansvargweb.ansv.gov.co/portalansv/apps/dashboards/5bd060badf5d44aab7eb215255f925fe"></iframe>

</body>
</html>
