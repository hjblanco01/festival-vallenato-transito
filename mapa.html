<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa Interactivo</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* BARRA SUPERIOR */
    .top-bar {
      display: flex;
      align-items: center;
      height: 60px;
      padding: 0 15px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
    }

    .btn-volver {
      background: #C0392B;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    }

    /* CONTENEDOR MAPA */
    .mapa-container {
      flex: 1;
      position: relative;
    }

    /* IFRAME */
    iframe {
      width: 100%;
      height: 90%; /* 👈 AQUÍ ESTÁ LA CLAVE */
      border: none;
      display: block;
    }

    /* ESPACIO INFERIOR PARA FILTRO */
    .espacio-filtro {
      height: 10%;
      background: transparent;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .top-bar {
        height: 50px;
      }

      iframe {
        height: 85%;
      }

      .espacio-filtro {
        height: 15%;
      }
    }
  </style>
</head>

<body>

<div class="top-bar">
  <a href="index.html" class="btn-volver">← Volver</a>
</div>

<div class="mapa-container">

  <iframe 
    src="https://srvansvargweb.ansv.gov.co/portalansv/apps/dashboards/5bd060badf5d44aab7eb215255f925fe"
    allowfullscreen>
  </iframe>

  <div class="espacio-filtro"></div>

</div>

</body>
</html>
